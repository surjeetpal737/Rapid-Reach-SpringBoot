spring.application.name=rapid-reach

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/Rapidreach?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# FIX: MySQLDialect is deprecated in Hibernate 6; use MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ─── File Upload ──────────────────────────────────────────────────────────────
# FIX: Without these limits, uploading an ID proof crashes with MaxUploadSizeExceededException
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ─── Session ──────────────────────────────────────────────────────────────────
# FIX: 30-minute session timeout so users are not logged in indefinitely
server.servlet.session.timeout=30m
