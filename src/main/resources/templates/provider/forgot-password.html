<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Rapid Reach</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="form-page">
<main class="form-box">
    <h1>Reset Provider Password</h1>
    <p class="detail">Enter your registered email and a new password.</p>

    <form th:action="@{/providers/forgot-password}" th:object="${forgotPassword}" method="post">
        <label for="email">Registered Email</label>
        <input id="email" type="email" th:field="*{email}" required autocomplete="email">
        <div class="error" th:errors="*{email}"></div>

        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" th:field="*{newPassword}"
               minlength="4" required autocomplete="new-password">
        <div class="error" th:errors="*{newPassword}"></div>

        <div class="actions">
            <button type="submit">Reset Password</button>
            <a class="btn btn-secondary" th:href="@{/providers/login}">Back to Login</a>
        </div>
    </form>
</main>
</body>
</html>
