<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service | Rapid Reach</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="form-page">
<main class="form-box wide">
    <h1>Book a Service</h1>

    <!-- Provider summary -->
    <div class="card" style="margin-bottom: 20px;">
        <p><b>Customer:</b> <span th:text="${customer.name}">User</span></p>
        <p><b>Provider:</b> <span th:text="${provider.name}">Provider</span></p>
        <p><b>Service:</b> <span th:text="${provider.serviceType}">Service</span></p>
        <p><b>Location:</b>
            <span th:text="${provider.city}">City</span>
            <span th:if="${provider.area != null}">, <span th:text="${provider.area}"></span></span>
        </p>
    </div>

    <!--
        FIX: Previously this form only had a hidden providerId field.
        The BookingRequestDto has @NotBlank / @NotNull on serviceType, city, area,
        preferredDate, preferredTime, and problemDescription — all of which would
        fail validation and return the user to the form with confusing errors.
        All required fields are now rendered as proper form inputs.
    -->
    <form th:action="@{/bookings}" th:object="${bookingRequest}" method="post">

        <!-- Required hidden: provider ID -->
        <input type="hidden" th:field="*{providerId}">

        <!-- Pre-fill from provider; user can adjust -->
        <label for="serviceType">Service Type</label>
        <input id="serviceType" type="text" th:field="*{serviceType}"
               th:value="${provider.serviceType}" placeholder="e.g. Plumber" required>
        <div class="error" th:errors="*{serviceType}"></div>

        <label for="city">City</label>
        <input id="city" type="text" th:field="*{city}"
               th:value="${provider.city}" placeholder="e.g. Indore" required>
        <div class="error" th:errors="*{city}"></div>

        <label for="area">Area / Locality</label>
        <input id="area" type="text" th:field="*{area}"
               placeholder="e.g. Vijay Nagar" required>
        <div class="error" th:errors="*{area}"></div>

        <label for="preferredDate">Preferred Date</label>
        <input id="preferredDate" type="date" th:field="*{preferredDate}" required>
        <div class="error" th:errors="*{preferredDate}"></div>

        <label for="preferredTime">Preferred Time</label>
        <input id="preferredTime" type="time" th:field="*{preferredTime}" required>
        <div class="error" th:errors="*{preferredTime}"></div>

        <label for="problemDescription">Problem Description</label>
        <textarea id="problemDescription" th:field="*{problemDescription}"
                  rows="4" placeholder="Describe the issue in detail (max 800 characters)" required
                  style="width:100%;border:1px solid #cfd8e3;border-radius:6px;
                         font-size:1rem;padding:11px 12px;margin-top:6px;"></textarea>
        <div class="error" th:errors="*{problemDescription}"></div>

        <div class="actions">
            <button type="submit">Confirm Booking</button>
            <a class="btn btn-secondary" th:href="@{/customers/dashboard}">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
